<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Видеотека с выбором по миниатюрам</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0f1e;
            color: #eef2ff;
            padding: 2rem 1.5rem;
        }

        /* главный контейнер — адаптивная сетка */
        .app-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* видео‑плеер */
        .video-section {
            margin-bottom: 2.5rem;
            border-radius: 28px;
            overflow: hidden;
            background: #000000;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
        }

        video {
            width: 100%;
            display: block;
            background: #000;
            aspect-ratio: 16 / 9;
        }

        /* галерея миниатюр — CSS Grid */
        .thumbnails-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        /* карточка видео */
        .video-card {
            background: #111827;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #1f2a3e;
        }

        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.5);
            border-color: #3b4a6b;
        }

        /* активная карточка (то, что сейчас играет) */
        .video-card.active {
            border: 2px solid #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.4);
        }

        /* область миниатюры */
        .thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: opacity 0.2s;
        }

        /* заглушка если нет картинки */
        .placeholder-thumb {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e2a44, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #60a5fa;
        }

        /* название видео */
        .video-title {
    padding: 0.75rem 0.75rem 0.9rem 0.75rem;
    font-weight: 500;
    font-size: 0.9rem;
    text-align: center;
    background: #111827;
    color: #e2e8f0;
    border-top: 1px solid #1f2a3e;
    /* убираем однострочность */
    white-space: normal;
    word-break: break-word;
    /* не обрезаем, а переносим */
}

        /* подпись под плеером */
        .info-bar {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        h2 {
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .video-count {
            background: #1f2a44;
            padding: 0.25rem 0.85rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .thumbnails-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.8rem;
            }
            .video-title {
                font-size: 0.75rem;
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="info-bar">
        <h2>📽️ Видеосборник</h2>
        <span class="video-count" id="videoCount">0 видео</span>
    </div>

    <!-- плеер -->
    <div class="video-section">
        <video id="mainPlayer" controls preload="metadata">
            <source src="" type="video/mp4">
            Ваш браузер не поддерживает HTML5 video.
        </video>
    </div>

    <!-- сетка с миниатюрами -->
    <div class="thumbnails-grid" id="thumbnailsGrid">
        <!-- сюда динамически подставятся карточки видео -->
    </div>
</div>

<script>
    // ------------------------------------------------------------

    // ------------------------------------------------------------
    const videos = [

            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/dogs.png"   // ПУТЬ К МИНИАТЮРЕ (можно оставить пустым)
        },
        {

            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/pencil.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/pencil.png"
        },
        {
            id: 3,
            title: "Про любовь - Егор и Аня",
            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/love.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/love.png"
        },
        {
            id: 4,
            title: "Болтунья - Вера Пятина",
            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/blabla.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/blabla.png"
        },
        {
            id: 5,
            title: "Записка - Платон и Егор",
            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/note.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/note.png"
        },
        {
            id: 6,
            title: "Оса - Татьяна Майкова",
            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/bine.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/bine.jpg"
        },
        {
            id: 7,
            title: "Некрасивая девочка - Виктория Смирнова",
            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/beautiful.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/beautiful.png"
        },
        {
            id: 8,
            title: "Первая любовь - Шавлюга Анна",
            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/first.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/first.png"
        },
        {
            id: 9,
            title: "Колдунье не колдуется - Кирдакова Алиса",
            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/magick.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/magick.png"
        },
        {
            id: 10,
            title: "36 и 5 - Марк Галкин",
            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/temp.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/temp.png"
        },
        {
            id: 11,
            title: "Послушайте! - Фёдор Еремеев",
            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/ahtung.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/ahtung.png"
        },
        {
            id: 12,
            title: "Не спать! - Тимур Миндияров",
            src: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/sleep.mp4",
            thumbnail: "C:/Users/Владелец/Pictures/2026-май-театралка выпуск/Плеер/sleep.png"
        }
    ];

    // ------------------------------------------------------------
    // 2. ПОЛУЧАЕМ ЭЛЕМЕНТЫ СТРАНИЦЫ
    // ------------------------------------------------------------
    const player = document.getElementById('mainPlayer');
    const gridContainer = document.getElementById('thumbnailsGrid');
    const videoCountSpan = document.getElementById('videoCount');

    // ------------------------------------------------------------
    // 3. ФУНКЦИЯ ОТРИСОВКИ ГАЛЕРЕИ
    // ------------------------------------------------------------
    function renderGallery() {
        // очищаем старую сетку, если была
        gridContainer.innerHTML = '';

        // обновляем счётчик видео
        videoCountSpan.innerText = `${videos.length} видео`;

        // проходим по каждому видео и создаём карточку
        videos.forEach((video, index) => {
            // главный контейнер карточки
            const card = document.createElement('div');
            card.className = 'video-card';
            card.setAttribute('data-video-id', video.id);
            card.setAttribute('data-video-src', video.src);

            // блок миниатюры (изображение или заглушка)
            const thumbDiv = document.createElement('div');
            thumbDiv.className = 'thumbnail';

            if (video.thumbnail && video.thumbnail.trim() !== "") {
                const img = document.createElement('img');
                img.src = video.thumbnail;
                img.alt = video.title;
                img.loading = "lazy";
                // если картинка не загрузилась — показываем заглушку
                img.onerror = () => {
                    thumbDiv.innerHTML = `<div class="placeholder-thumb">🎬</div>`;
                };
                thumbDiv.appendChild(img);
            } else {
                // если миниатюра не задана — цветная заглушка с иконкой
                const placeholderDiv = document.createElement('div');
                placeholderDiv.className = 'placeholder-thumb';
                placeholderDiv.innerText = '🎬';
                thumbDiv.appendChild(placeholderDiv);
            }

            // название видео
            const titleDiv = document.createElement('div');
            titleDiv.className = 'video-title';
            titleDiv.innerText = video.title;

            // собираем карточку
            card.appendChild(thumbDiv);
            card.appendChild(titleDiv);

            // 4. КЛИК ПО КАРТОЧКЕ → переключаем видео
            card.addEventListener('click', (e) => {
                // меняем источник видео
                const videoSrc = card.getAttribute('data-video-src');
                player.querySelector('source').src = videoSrc;
                player.load();       // перезагружаем плеер с новым src
                player.play();       // автоматически начинаем проигрывание

                // убираем выделение со всех карточек
                document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active'));
                // выделяем текущую карточку
                card.classList.add('active');
            });

            gridContainer.appendChild(card);
        });
    }

    // ------------------------------------------------------------
    // 5. ЗАГРУЗКА ПЕРВОГО ВИДЕО (по умолчанию)
    // ------------------------------------------------------------
    function loadFirstVideo() {
        if (videos.length > 0) {
            const firstSrc = videos[0].src;
            player.querySelector('source').src = firstSrc;
            player.load();
            // выделяем первую карточку
            const firstCard = document.querySelector('.video-card');
            if (firstCard) firstCard.classList.add('active');
        } else {
            // если видео нет — показываем сообщение в плеере
            player.querySelector('source').src = "";
            player.load();
        }
    }

    // ------------------------------------------------------------
    // 6. ЗАПУСК
    // ------------------------------------------------------------
    renderGallery();
    loadFirstVideo();
</script>
</body>
</html>
