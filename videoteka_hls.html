    <style>
        /* Стили остаются теми же, что были */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0f1e;
            color: #eef2ff;
            padding: 2rem 1.5rem;
        }
        .app-container { max-width: 1300px; margin: 0 auto; }
        .video-section {
            margin-bottom: 2.5rem;
            border-radius: 28px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6);
        }
        video {
            width: 100%;
            display: block;
            background: #000;
            aspect-ratio: 16 / 9;
        }
        .thumbnails-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.25rem;
        }
        .video-card {
            background: #111827;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #1f2a3e;
        }
        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.5);
            border-color: #3b4a6b;
        }
        .video-card.active {
            border: 2px solid #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.4);
        }
        .thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .placeholder-thumb {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e2a44, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #60a5fa;
        }
        .video-title {
            padding: 0.75rem 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            text-align: center;
            background: #111827;
            color: #e2e8f0;
            border-top: 1px solid #1f2a3e;
            white-space: normal;
            word-break: break-word;
            line-height: 1.3;
            min-height: 3rem;
        }
        .info-bar {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        h2 {
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .video-count {
            background: #1f2a44;
            padding: 0.25rem 0.85rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .thumbnails-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; }
            .video-title { font-size: 0.75rem; padding: 0.5rem; }
        }
    </style>

    // ------------------------------------------------------------
    // 2. ИНИЦИАЛИЗАЦИЯ
    // ------------------------------------------------------------
    const player = document.getElementById('mainPlayer');
    const gridContainer = document.getElementById('thumbnailsGrid');
    const videoCountSpan = document.getElementById('videoCount');

    // Переменная для хранения текущего экземпляра Hls
    let hls = null;

    function destroyHls() {
        if (hls) {
            hls.destroy();
            hls = null;
        }
    }

    function loadVideo(src) {
        destroyHls();
        // Если браузер поддерживает HLS нативно (Safari), используем напрямую
        if (player.canPlayType('application/vnd.apple.mpegurl')) {
            player.src = src;
            player.play();
            return;
        }
        // Иначе используем hls.js
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(src);
            hls.attachMedia(player);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                // player.play();
            });
            // Обработка ошибок
            hls.on(Hls.Events.ERROR, function(event, data) {
                console.error('HLS ошибка:', data);
            });
        } else {
            // Если ничего не поддерживается
            player.src = src;
            player.play();
        }
    }

    // ------------------------------------------------------------
    // 3. ОТРИСОВКА ГАЛЕРЕИ
    // ------------------------------------------------------------
    function renderGallery() {
        gridContainer.innerHTML = '';
        videoCountSpan.innerText = `${videos.length} видео`;

        videos.forEach((video, index) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.setAttribute('data-video-id', video.id);
            card.setAttribute('data-video-src', video.src);

            const thumbDiv = document.createElement('div');
            thumbDiv.className = 'thumbnail';
            if (video.thumbnail && video.thumbnail.trim() !== "") {
                const img = document.createElement('img');
                img.src = video.thumbnail;
                img.alt = video.title;
                img.loading = "lazy";
                img.onerror = () => {
                    thumbDiv.innerHTML = `<div class="placeholder-thumb">🎬</div>`;
                };
                thumbDiv.appendChild(img);
            } else {
                const placeholderDiv = document.createElement('div');
                placeholderDiv.className = 'placeholder-thumb';
                placeholderDiv.innerText = '🎬';
                thumbDiv.appendChild(placeholderDiv);
            }

            const titleDiv = document.createElement('div');
            titleDiv.className = 'video-title';
            titleDiv.innerText = video.title;

            card.appendChild(thumbDiv);
            card.appendChild(titleDiv);

            card.addEventListener('click', (e) => {
                const src = card.getAttribute('data-video-src');
                if (src) {
                    loadVideo(src);
                    // выделение
                    document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                }
            });

            gridContainer.appendChild(card);
        });
    }

    // ------------------------------------------------------------
    // 4. АВТОЗАГРУЗКА ПЕРВОГО ВИДЕО
    // ------------------------------------------------------------
    function loadFirstVideo() {
        if (videos.length > 0 && videos[0].src) {
            loadVideo(videos[0].src);
            const firstCard = document.querySelector('.video-card');
            if (firstCard) firstCard.classList.add('active');
        }
    }

    // ------------------------------------------------------------
    // 5. ЗАПУСК
    // ------------------------------------------------------------
    renderGallery();
    loadFirstVideo();
</script>
